# Agentic Multimodal App — full stack.
#   docker compose up --build
# GPU services share device 0 (FP8 keeps all three models ~49GB).
# Phoenix observability lives in observability/compose.phoenix.yml (P1 overlay).

x-gpu: &gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

x-serving-build: &serving-build
  build:
    context: ./serving
    dockerfile: Dockerfile
  env_file: .env
  <<: *gpu
  restart: unless-stopped

services:
  # ── Model serving (vLLM, OpenAI-compatible, FP8) ──────────────────────────
  serving-text:
    <<: *serving-build
    environment:
      MODEL: ${TEXT_MODEL}
      SERVED_NAME: text
      QUANT: ${TEXT_QUANT}
      PORT: "8001"
    ports: ["8001:8001"]

  serving-vlm:
    <<: *serving-build
    environment:
      MODEL: ${VLM_MODEL}
      SERVED_NAME: vlm
      QUANT: ${VLM_QUANT}
      PORT: "8002"
    ports: ["8002:8002"]

  # MERaLiON-3 has no vLLM support yet -> Transformers shim (bf16). Default.
  serving-audio:
    build:
      context: ./serving
      dockerfile: Dockerfile.meralion
    env_file: .env
    environment:
      MODEL: ${AUDIO_MODEL}
      SERVED_NAME: audio
      PORT: "8003"
    ports: ["8003:8003"]
    <<: *gpu
    restart: unless-stopped

  # Alternative NVIDIA ASR (Canary) for A/B comparison. ASR-only, no
  # paralinguistics. Off by default; enable with: --profile asr-compare
  # Compare on :8004, or point AUDIO_BASE_URL at it to run the app on Canary.
  serving-asr-canary:
    profiles: ["asr-compare"]
    build:
      context: ./serving
      dockerfile: Dockerfile.canary
    env_file: .env
    environment:
      MODEL: ${ASR_ALT_MODEL:-nvidia/canary-1b-v2}
      SERVED_NAME: audio
      PORT: "8004"
    ports: ["8004:8004"]
    <<: *gpu
    restart: unless-stopped

  # ── Graph store (FalkorDB) ────────────────────────────────────────────────
  falkordb:
    image: falkordb/falkordb:latest
    ports: ["6379:6379", "3000:3000"]
    volumes: ["falkordb_data:/data"]
    restart: unless-stopped

  # ── Vector store (Milvus standalone + deps; cuVS GPU index) ───────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes: ["etcd_data:/etcd"]

  minio:
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data
    volumes: ["minio_data:/minio_data"]

  milvus:
    image: milvusdb/milvus:v2.4.13-gpu
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports: ["19530:19530", "9091:9091"]
    depends_on: [etcd, minio]
    volumes: ["milvus_data:/var/lib/milvus"]
    <<: *gpu
    restart: unless-stopped

  # ── Agent app (FastAPI) ───────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    env_file: .env
    ports: ["8000:8000"]
    volumes:
      - ./data:/app/data
      - ./app/config:/app/app/config
    depends_on: [serving-text, serving-vlm, serving-audio, falkordb, milvus]
    restart: unless-stopped

  # ── UI (SvelteKit) ────────────────────────────────────────────────────────
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    environment:
      APP_API_URL: http://app:8000
    ports: ["5173:5173"]
    depends_on: [app]
    restart: unless-stopped

volumes:
  falkordb_data:
  etcd_data:
  minio_data:
  milvus_data:
