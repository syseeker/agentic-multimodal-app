# Neo4j — shared graph store for Sherlock (amms project)
# Used by: non-video ER (Phase 6), VSS video ER alignment (Phase 7)
# Start: docker compose -p amms -f deploy/compose.neo4j.yaml up -d
# Bolt: bolt://localhost:7687  Browser: http://localhost:7474
services:
  neo4j:
    image: neo4j:5.20-community
    container_name: amms-neo4j
    environment:
      NEO4J_AUTH: neo4j/sherlock_dev
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 512m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - amms-neo4j-data:/data
      - amms-neo4j-logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  amms-neo4j-data:
  amms-neo4j-logs:
