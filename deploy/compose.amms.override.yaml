# Phase 1 isolation overlay for the harmonized "amms" stack.
# Layered on AI-Q's upstream deploy/compose/docker-compose.yaml so our deployment
# never collides with an existing AI-Q stack (container names / ports). We do NOT
# edit the blueprint's compose — this is a deploy-time override (orchestration overlay).
#   docker compose -p amms -f <aiq>/deploy/compose/docker-compose.yaml \
#                          -f deploy/compose.amms.override.yaml up -d --build aiq-agent
services:
  aiq-agent:
    container_name: amms-aiq-agent
    # host port comes from PORT in deploy/.env (set to 8100)
    # Phase 7: mount patched Sherlock prompt templates over the baked-in ones
    # Mount only the prompts/ subdirs — preserves the agent Python code in the image
    volumes:
      - ../external/aiq/src/aiq_agent/agents/shallow_researcher/prompts:/app/src/aiq_agent/agents/shallow_researcher/prompts:ro
      - ../external/aiq/src/aiq_agent/agents/clarifier/prompts:/app/src/aiq_agent/agents/clarifier/prompts:ro
    environment:
      # Phase 7: switch to Sherlock forensic config (MCP tools + no web search)
      BACKEND_CONFIG: /app/configs/config_sherlock_frag.yml
      CONFIG_FILE: /app/configs/config_sherlock_frag.yml
      # Sherlock MCP server (graph tools) — reachable on amms_aiq-network
      SHERLOCK_MCP_URL: http://amms-sherlock-mcp:9901/mcp

  postgres:
    container_name: amms-aiq-postgres
    # not published to the host — the agent reaches it over the compose network.
    ports: !reset []
