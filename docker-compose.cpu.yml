# CPU-only stack — no GPU, no local model serving.
# Runs app + UI + FalkorDB locally; inference goes to remote NVIDIA NIM
# (build.nvidia.com). Vectors use Chroma in-process (no Milvus/etcd/minio).
#
#   1) put NVIDIA_API_KEY=nvapi-... in .env
#   2) docker compose -f docker-compose.cpu.yml up --build
#
# Note: MERaLiON-3 is NOT hosted on build.nvidia.com, so the AUDIO modality is
# unavailable here. All committed sample/demo cases are text (+ optional image),
# so they run fine. For audio, serve MERaLiON on a GPU box (see docker-compose.yml).

services:
  falkordb:
    image: falkordb/falkordb:latest
    ports: ["6379:6379", "3000:3000"]
    volumes: ["falkordb_data:/data"]
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    environment:
      # All modalities -> NIM (OpenAI-compatible). Same key for each.
      TEXT_BASE_URL: https://integrate.api.nvidia.com/v1
      VLM_BASE_URL: https://integrate.api.nvidia.com/v1
      AUDIO_BASE_URL: https://integrate.api.nvidia.com/v1
      SERVING_API_KEY: ${NVIDIA_API_KEY:?set NVIDIA_API_KEY in .env}
      # Model IDs — verify/adjust against build.nvidia.com (these are reliable picks).
      TEXT_SERVED: ${NIM_TEXT_MODEL:-meta/llama-3.3-70b-instruct}
      VLM_SERVED: ${NIM_VLM_MODEL:-meta/llama-3.2-11b-vision-instruct}
      AUDIO_SERVED: ${NIM_AUDIO_MODEL:-unavailable}
      # NIM structured-output mechanism.
      STRUCT_MODE: nvext
      # No GPU vector DB — Chroma in-process.
      VECTOR_BACKEND: chroma
      CHROMA_PATH: /app/data/chroma
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: "6379"
      AGENT_ENGINE: deepagents
      ENABLE_TRACING: "false"
    ports: ["8000:8000"]
    volumes:
      - ./data:/app/data
      - ./app/config:/app/app/config
    depends_on: [falkordb]
    restart: unless-stopped

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    environment:
      PUBLIC_API_URL: http://localhost:8000
    ports: ["5173:5173"]
    depends_on: [app]
    restart: unless-stopped

volumes:
  falkordb_data:
